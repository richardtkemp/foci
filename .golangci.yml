run:
  timeout: 5m
  tests: false

linters:
  disable-all: true
  enable:
    # Bug finders
    - errcheck       # unchecked errors
    - govet          # suspicious constructs
    - staticcheck    # bugs, performance, unused code
    - ineffassign    # ineffectual assignments
    - unused         # unused constants, variables, functions, types
    - gosec          # security issues
    - unparam        # unused function parameters

    # Code quality
    - dupl           # duplicate code detection

    # Import restrictions
    - depguard       # forbid stdlib log packages
    - forbidigo      # forbid raw exec.Command (must use procx.Spawn)

linters-settings:
  dupl:
    threshold: 100   # minimum tokens for duplication (lower = stricter)

  depguard:
    rules:
      prevent_stdlib_logging:
        list-mode: lax
        deny:
          - pkg: "log/slog"
            desc: "Use foci/internal/log instead of log/slog"
          - pkg: "log$"
            desc: "Use foci/internal/log instead of stdlib log"

  forbidigo:
    # Ban raw exec.Command / exec.CommandContext. All subprocess spawning
    # must go through procx.Spawn / procx.SpawnSetsid so the
    # foci-secrets supplementary group is stripped from children
    # (otherwise child processes can read /home/foci/config/secrets.toml).
    # Allowed callers: internal/procx/procx.go (the helper itself, which
    # holds the bootstrap probe and the spawn entry points).
    #
    # Ban raw os.MkdirTemp / os.CreateTemp. All temp file/dir creation
    # must go through tempdir.Mkdir / tempdir.Create / tempdir.SpawnMkdir
    # (production) or testtemp.Mkdir / testtemp.Create (tests) so temp
    # files land under /tmp/foci or /tmp/fgw, not scattered in /tmp.
    # Exempted: tempdir.go/testtemp.go (the helpers), log/rotate.go,
    # spill.go, http.go (atomic O_EXCL writes in a target dir).
    forbid:
      - p: ^exec\.Command$
        msg: "use procx.Spawn (raw exec.Command leaks the foci-secrets group to children)"
      - p: ^exec\.CommandContext$
        msg: "use procx.Spawn (raw exec.CommandContext leaks the foci-secrets group to children)"
      - p: ^os\.MkdirTemp$
        msg: "use tempdir.Mkdir / tempdir.SpawnMkdir / testtemp.Mkdir (raw os.MkdirTemp scatters files in /tmp)"
      - p: ^os\.CreateTemp$
        msg: "use tempdir.Create / testtemp.Create (raw os.CreateTemp scatters files in /tmp)"
    analyze-types: false

  errcheck:
    exclude-functions:
      # Common cases where error checking is often skipped intentionally
      - (io.Closer).Close
      - (*os.File).Close

  gosec:
    excludes:
      - G204  # subprocess with variable - common in shell tools
      - G304  # file path from variable - common in file tools
      - G101  # hardcoded credentials - false positives on constants
      - G301  # directory permissions - 0755 needed for shared workspaces
      - G306  # file permissions - need group write (0644/0664)

  staticcheck:
    checks: ["all"]

  unparam:
    check-exported: false

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Exclude some linters from test files
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - dupl
        - unparam
        - ineffassign
        - forbidigo

    # Ignore unused ctx in tool functions - keep signature consistent
    - path: tools/
      text: "ctx.*is unused"
      linters:
        - unparam

    # forbidigo exemption: internal/procx/procx.go is the sole permitted
    # caller of exec.Command* — it contains the spawn helpers (Spawn /
    # SpawnSetsid) and the CAP_SETGID probe.
    - path: internal/procx/procx\.go
      linters:
        - forbidigo

    # forbidigo exemption: temp helpers are the sole permitted callers of
    # os.MkdirTemp / os.CreateTemp — they implement the sanctioned wrappers
    # (Mkdir, Create, SpawnMkdir) that the rest of the codebase must use.
    - path: internal/tempdir/tempdir\.go
      linters:
        - forbidigo
    - path: internal/testtemp/testtemp\.go
      linters:
        - forbidigo

    # forbidigo exemption: atomic O_EXCL writes in a target directory (not
    # temp scattering) — these create temp files inside a specific log/spill/
    # download dir for crash-safe rename, not under the OS temp root.
    - path: internal/log/rotate\.go
      linters:
        - forbidigo
    - path: internal/tools/spill/spill\.go
      linters:
        - forbidigo
    - path: internal/tools/http\.go
      linters:
        - forbidigo
