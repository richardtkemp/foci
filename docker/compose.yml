services:
  foci:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      additional_contexts:
        char-import: ${FOCI_CHAR_IMPORT_DIR:-./character}
        memory-import: ${FOCI_MEMORY_IMPORT_DIR:-./memory}
    container_name: foci
    restart: unless-stopped
    cap_add:
      - SETGID  # allows foci-gw to drop foci-secrets group from child processes
    env_file:
      - .env
    volumes:
      # Persist all state: config, sessions, memory, character files.
      # First run triggers the setup wizard; subsequent runs start normally.
      - foci-home:/home/foci
    # No ports needed — Telegram and Discord both use outbound connections.
    # Uncomment if you enable the HTTP API:
    # ports:
    #   - "8080:8080"

volumes:
  foci-home:
